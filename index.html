<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Football Club Blueprint Â· 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ââââââââââââââââââââââââââââââââââââââââââââââââââââ
   FOOTBALL CLUB BLUEPRINT â DARK EDITION
   ââââââââââââââââââââââââââââââââââââââââââââââââââââ */
:root{
  --bg:#0a0f1e;
  --bg2:#0d1526;
  --surface:#111927;
  --surface2:#151f30;
  --border:#1e2d45;
  --border2:#243552;
  --navy:#080e1e;
  --green:#3b82f6;
  --green-mid:#2563eb;
  --green-light:#60a5fa;
  --green-pale:#1e3a5f;
  --teal:#06b6d4;
  --accent:#f59e0b;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
  --text4:#334155;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.5);
  --shadow-md:0 4px 24px rgba(0,0,0,.6);
  --shadow-lg:0 12px 48px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(37,99,235,.22) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(6,182,212,.12) 0%,transparent 60%);background-attachment:fixed;}


/* ââ SIDE TABS (Sporting / Operational) ââ */
.side-tabs{display:flex;gap:8px;margin:20px 0 28px;flex-wrap:wrap;}
.side-tab{padding:10px 24px;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);color:var(--text2);background:transparent;transition:all .18s;letter-spacing:.02em;}
.side-tab:hover{border-color:var(--green);color:var(--green-light);}
.side-tab.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 16px rgba(59,130,246,.35);}
.side-section{display:none;}
.side-section.active{display:block;}
/* ââ SCOUTING WORKFLOW ââ */
.wf-phase-block{margin-bottom:28px;}
.wf-phase-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.5;margin-bottom:10px;padding-left:2px;}
.wf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.wf-step{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;transition:box-shadow .15s,border-color .15s;}
.wf-step:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.wf-step-num{font-size:9px;font-weight:800;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:5px;letter-spacing:.08em;}
.wf-step-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;}
.wf-step-desc{font-size:11px;color:var(--text2);line-height:1.55;}
.wf-arrow{text-align:center;font-size:18px;color:var(--border2);margin:2px 0;}

/* ââ TOPBAR ââ */
.topbar{background:rgba(4,8,16,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.04),0 4px 32px rgba(0,0,0,.6);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#22c55e,#15803d);display:flex;align-items:center;justify-content:center;}
.brand-logo svg{width:17px;height:17px;}
.brand-name{font-size:15px;font-weight:800;color:#ffffff;letter-spacing:-.02em;}
.brand-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;font-weight:300;}
.nav-pills{display:flex;flex-wrap:wrap;gap:4px;margin-left:auto;}
.nav-pill{font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.18);cursor:pointer;color:rgba(255,255,255,.75);background:transparent;transition:all 0.15s;}
.nav-pill:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35);}
.nav-pill.active{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border-color:transparent;box-shadow:0 2px 16px rgba(59,130,246,.4);font-weight:700;}

/* ââ PAGES ââ */
.page{display:none;padding:28px 28px 64px;max-width:1400px;margin:0 auto;}
.page.active{display:block;}
.page-title{font-size:32px;font-weight:800;color:#f1f5f9;margin-bottom:8px;letter-spacing:-.04em;}
.page-desc{font-size:13.5px;color:var(--text2);line-height:1.75;max-width:720px;margin-bottom:24px;font-weight:300;}

/* ââ STATS ââ */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:28px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;box-shadow:var(--shadow-sm);}
.stat:hover{box-shadow:var(--shadow-md);}
.stat-lbl{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;}
.stat-val{font-size:23px;font-weight:800;color:var(--text);letter-spacing:-.03em;font-family:'DM Mono',monospace;}
.stat-note{font-size:10px;color:var(--text4);margin-top:3px;}

/* ââ SECTION LABELS ââ */
.section-label{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.section-label::before{content:'';display:block;width:3px;height:14px;background:#22c55e;border-radius:2px;}
.section-sublabel{font-size:12px;color:var(--text2);margin-bottom:12px;margin-top:-10px;}

/* ââ VENDOR CARDS ââ */
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:13px;margin-bottom:28px;}
.vcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow .15s,transform .15s,border-color .15s;box-shadow:var(--shadow-sm);}
.vcard:hover{box-shadow:var(--shadow-md),0 0 0 1px rgba(59,130,246,.25),0 0 32px rgba(59,130,246,.12);transform:translateY(-3px);border-color:rgba(59,130,246,.4);}
.vcard-head{padding:14px 16px 10px;display:flex;align-items:center;gap:12px;}
.vlogo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;}
.vlogo img{width:100%;height:100%;object-fit:contain;padding:4px;}
.vmeta{flex:1;min-width:0;}
.vname{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.vorigin{font-size:11px;color:var(--text3);margin-top:1px;}
.vtags{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:4px;}
.vtag{font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid;font-weight:600;}
.vbody{padding:0 16px 14px;font-size:12.5px;color:var(--text2);line-height:1.7;display:none;border-top:1px solid var(--border);padding-top:11px;margin-top:2px;}
.vbody.open{display:block;}
.vfooter{padding:9px 16px;background:var(--surface2);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.vprice{font-size:11px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;}
.vclient{font-size:10px;color:var(--text3);}
.vbtn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--border2);color:var(--green);background:var(--green-pale);transition:all .12s;}
.vbtn:hover{background:var(--green);color:#fff;}
.badge-sm{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.03em;}

/* ââ PLATFORMS ââ */
.platform-list{display:flex;flex-direction:column;gap:16px;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
.pcard-head{padding:16px 18px;display:flex;align-items:center;gap:14px;}
.pcard-logo{width:44px;height:44px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pcard-logo img{height:36px;width:auto;object-fit:contain;}
.pcard-body{padding:0 18px 16px;}
.pcard-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px;}
.mod-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.mod-tag{font-size:10px;padding:3px 9px;border-radius:6px;border:1px solid;font-weight:600;}
.pcard-col-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.pstr-list{padding-left:14px;font-size:12px;color:var(--text2);line-height:1.7;}
.gap-text{font-size:12px;color:var(--text2);line-height:1.7;}
.pcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px;}

/* ââ HOME LAYOUT ââ */
.home-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;}
.funnel-container{background:var(--surface);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.funnel-heading{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.eq-box{background:linear-gradient(135deg,var(--navy),#134e26);border-radius:var(--radius-md);padding:14px 20px;margin-top:16px;color:#fff;}
.eq-parts{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:6px;}
.eq-item{font-size:13px;font-weight:700;background:rgba(255,255,255,.12);padding:4px 12px;border-radius:6px;}
.eq-plus,.eq-equals{font-size:18px;font-weight:800;opacity:.6;}
.eq-result{font-size:14px;font-weight:800;color:#4ade80;padding:4px 12px;background:rgba(74,222,128,.15);border-radius:6px;border:1px solid rgba(74,222,128,.3);}
.eq-sub{font-size:11px;opacity:.6;font-weight:300;}
.legend-box{background:var(--surface);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--border);position:sticky;top:90px;}
.legend-title{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .12s;}
.legend-item:last-child{border-bottom:none;}
.legend-item:hover .legend-text{color:var(--green-mid);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-text{font-size:12px;color:var(--text2);font-weight:500;flex:1;}
.legend-arrow{font-size:11px;color:var(--text4);}

/* ââ BRANCH DIVIDERS ââ */
.branch-divider{display:flex;align-items:center;gap:10px;margin:20px 0 10px;}
.branch-line{flex:1;height:1px;background:var(--border);}
.branch-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;}

/* ââ PRICING HIGHLIGHT ââ */
.pricing-highlight{background:linear-gradient(135deg,#0f1e3a 0%,#0a2744 100%);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:20px;color:#fff;box-shadow:var(--shadow-md);}
.ph-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.6;margin-bottom:10px;}
.ph-grid{display:flex;gap:24px;flex-wrap:wrap;}
.ph-item{text-align:center;}
.ph-val{font-size:26px;font-weight:800;color:#4ade80;font-family:'DM Mono',monospace;}
.ph-desc{font-size:10px;opacity:.65;margin-top:2px;}

/* ââ MARKET DATA PANEL ââ */
#fin-panel{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.1);padding:12px 28px;box-shadow:0 4px 16px rgba(5,46,22,.35);}
#fin-panel .stat{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);}
#fin-panel .stat-lbl{color:rgba(255,255,255,.5);}
#fin-panel .stat-val{color:#fff;}
#fin-panel .stat-note{color:rgba(255,255,255,.38);}
#fin-stats-inner{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;}

/* ââ WORKFLOW ââ */
.wf-steps{display:flex;flex-direction:column;gap:0;}
.wf-node{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#fff;z-index:1;}
.wf-content{flex:1;padding:0 0 20px 12px;}
.wf-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.wf-desc{font-size:11.5px;color:var(--text2);line-height:1.6;margin-bottom:6px;font-weight:300;}
.wf-items{list-style:none;padding:0;display:flex;flex-direction:column;gap:3px;}
.wf-items li{font-size:11px;color:var(--text2);padding-left:14px;position:relative;line-height:1.5;}
.wf-items li::before{content:'â';position:absolute;left:0;color:#22c55e;font-weight:700;}
.wf-output{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#22c55e;color:#052e16;margin-top:6px;}

/* ââ DEPT CARDS ââ */
.dept-header{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .12s;}
.dept-header:hover{background:rgba(0,0,0,.02);}
.dept-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0;}
.dept-label{font-size:13px;font-weight:700;}
.dept-tagline{font-size:11px;color:var(--text3);font-weight:300;margin-top:1px;}
.dept-chevron{margin-left:auto;font-size:12px;transition:transform .2s;}
.dept-kpi-row{display:flex;flex-wrap:wrap;gap:5px;padding:10px 0 12px;}
.dept-kpi{font-size:10px;padding:3px 9px;border-radius:5px;background:var(--green-pale);border:1px solid var(--border2);color:var(--green);font-weight:600;font-family:'DM Mono',monospace;}

/* ââ PHASE / STEP CARDS ââ */
.phase-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:5px 10px 5px 12px;border-radius:6px;margin-bottom:8px;border-left:3px solid;}
.step-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:14px;}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;border-left-width:3px;}
.step-num{font-size:9px;font-weight:700;font-family:'DM Mono',monospace;opacity:.5;margin-bottom:3px;}
.step-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;}
.step-desc{font-size:10px;color:var(--text2);line-height:1.5;}

/* ââ OUTPUTS ââ */
.output-row{padding:9px 12px;background:#f0fdf4;border-radius:9px;border:1px solid #a7f3d0;margin-top:8px;}
.output-label{font-size:9px;font-weight:700;color:#065f46;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.output-chips{display:flex;flex-wrap:wrap;gap:4px;}
.output-chip{font-size:10px;padding:2px 9px;border-radius:5px;background:#fff;color:#065f46;border:1px solid #6ee7b7;font-weight:500;}
.files-row{padding:7px 12px;background:var(--green-pale);border-radius:9px;border:1px solid var(--border);margin-top:7px;}
.files-label{font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.files-chips{display:flex;flex-wrap:wrap;gap:4px;}
.file-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 9px;border-radius:5px;background:#fff;color:var(--green);border:1px solid var(--border2);font-weight:500;text-decoration:none;}
.file-chip:hover{background:var(--green);color:#fff;}

/* ââ ORG CHART TIP ââ */
.oc-tip{position:fixed;background:#052e16;color:#fff;font-size:11.5px;padding:8px 13px;border-radius:9px;max-width:280px;pointer-events:none;z-index:9999;display:none;box-shadow:0 4px 20px rgba(5,46,22,.5);line-height:1.5;border:1px solid rgba(255,255,255,.1);}
.oc-box{cursor:pointer;}
.oc-box:hover{filter:drop-shadow(0 3px 10px rgba(5,46,22,.4));}

/* ââ SCROLLBAR ââ */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--green-mid);}

/* ââ TEAMWORKS-STYLE DARK METRIC CARDS ââ */
.dark-panel{background:#0d1f12;border:1px solid #1a3d22;border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 8px 32px rgba(5,46,22,.4);}
.dark-panel-header{background:linear-gradient(135deg,#052e16,#0d2b1a);padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06);}
.dark-panel-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.02em;}
.dark-panel-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;font-weight:300;}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:2px;padding:0;}
.metric-row{padding:12px 20px;background:#0a1a0e;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s;position:relative;}
.metric-row:hover{background:#0f2414;}
.metric-row.active{background:#112b16;border-left:3px solid #22c55e;}
.metric-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.metric-score{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;}
.score-excellent{color:#4ade80;}
.score-good{color:#a3e635;}
.score-avg{color:#fbbf24;}
.score-low{color:#f87171;}
.metric-bar-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.metric-bar-fill{height:4px;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.metric-pct{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;font-family:'DM Mono',monospace;}

/* Score hero */
.score-hero{display:flex;align-items:center;gap:16px;padding:20px;}
.score-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;flex-shrink:0;}
.score-num{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;}
.score-denom{font-size:10px;opacity:.5;font-weight:300;}
.score-info{flex:1;}
.score-name{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.02em;}
.score-role{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.score-summary{font-size:11px;color:rgba(255,255,255,.55);margin-top:6px;line-height:1.5;}

/* Candidate comparison */
.candidate-bar{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.candidate-bar:hover{background:rgba(255,255,255,.03);}
.candidate-bar.top{background:rgba(34,197,94,.05);border-left:3px solid #22c55e;}
.candidate-rank{width:20px;font-size:11px;font-weight:700;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;text-align:center;}
.candidate-name{font-size:12px;font-weight:700;color:#fff;width:80px;flex-shrink:0;}
.candidate-track{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.candidate-fill{height:6px;border-radius:3px;}

        <div class="lp-card"><div class="lp-card-title">Federation or Member Association</div><div class="lp-card-body">Develop a structured talent identification model aligned with geography, fairness, coaching education, and long-term player tracking.</div></div>
        <div class="lp-card"><div class="lp-card-title">Club Modernizing Decision-Making</div><div class="lp-card-body">Connect scouting, performance, contracts, and executive reporting into one unified operational model.</div></div>
      </div>
    </section>
    <section class="lp-section">
      <div class="lp-label">From Concept to Execution</div>
      <h2 class="lp-h2">A Pathway to Implementation</h2>
      <p class="lp-body">The blueprint is designed not only as a framework, but as a pathway to implementation:</p>
      <div class="lp-steps">
        <div class="lp-step"><div class="lp-step-num">01</div><div class="lp-step-text"><strong>Diagnostic Phase</strong>Understanding the current structure and identifying gaps</div></div>
        <div class="lp-step"><div class="lp-step-num">02</div><div class="lp-step-text"><strong>Structural Design</strong>Defining roles, responsibilities, and organizational alignment</div></div>
        <div class="lp-step"><div class="lp-step-num">03</div><div class="lp-step-text"><strong>Process Definition</strong>Establishing clear workflows across departments</div></div>
        <div class="lp-step"><div class="lp-step-num">04</div><div class="lp-step-text"><strong>Data &amp; Tools Integration</strong>Connecting systems and enabling information flow</div></div>
        <div class="lp-step"><div class="lp-step-num">05</div><div class="lp-step-text"><strong>Stakeholder Alignment</strong>Ensuring leadership and departments operate cohesively</div></div>
        <div class="lp-step"><div class="lp-step-num">06</div><div class="lp-step-text"><strong>Continuous Review</strong>Adapting and evolving the model over time</div></div>
      </div>
    </section>
    <section class="lp-section">
      <div class="lp-label">Technology</div>
      <h2 class="lp-h2">Technology as an Enabler, Not a Driver</h2>
      <p class="lp-body">Technology should support decision-making, not replace it. The goal is to create an integrated environment where information flows efficiently across the organization:</p>
      <div class="lp-tech-grid">
        <div class="lp-tech-item">Centralized Data Environments</div>
        <div class="lp-tech-item">Scouting Platforms</div>
        <div class="lp-tech-item">Performance Tracking Systems</div>
        <div class="lp-tech-item">Contract &amp; Financial Integration</div>
        <div class="lp-tech-item">Decision-Support Dashboards</div>
      </div>
    </section>
    <section class="lp-section">
      <div class="lp-label">Operating Principles</div>
      <h2 class="lp-h2">How We Think and Work</h2>
      <div class="lp-principles">
        <div class="lp-principle"><strong>Clarity Over Complexity</strong>Simple, executable structures that everyone can follow</div>
        <div class="lp-principle"><strong>Structure Before Tools</strong>Get the organization right before choosing technology</div>
        <div class="lp-principle"><strong>Context Over Raw Data</strong>Numbers only matter when interpreted correctly</div>
        <div class="lp-principle"><strong>Long-Term Thinking</strong>Decisions made with the next 3–5 years in mind</div>
        <div class="lp-principle"><strong>Human Decision-Making</strong>Data supports judgment — it does not replace it</div>

function buildBenchmark(){
  const clubs = [...new Set(_BM_PLAYERS.map(p=>p.c))].sort();
  const clubOpts = clubs.map(c=>`<option value="${c}">${c}</option>`).join('');
  
  // 4-4-2 formation positions on pitch [cx%, cy%, posCode, label]
  const formPos = [
    {x:50,y:88,code:'GK',label:'GK',pos:'Keeper'},
    {x:15,y:68,code:'LB',label:'LB',pos:'Left Back'},
    {x:38,y:68,code:'CB',label:'CB',pos:'Centre-Back'},
    {x:62,y:68,code:'CB',label:'CB',pos:'Centre-Back'},
    {x:85,y:68,code:'RB',label:'RB',pos:'Right Back'},
    {x:15,y:44,code:'LW',label:'LM',pos:'Left Wing'},
    {x:38,y:44,code:'CM',label:'CM',pos:'Central Midfield'},
    {x:62,y:44,code:'CM',label:'CM',pos:'Central Midfield'},
    {x:85,y:44,code:'RW',label:'RM',pos:'Right Wing'},
    {x:35,y:20,code:'CF',label:'ST',pos:'Centre-Forward'},
    {x:65,y:20,code:'CF',label:'ST',pos:'Centre-Forward'},
  ];
  
  // Pitch SVG
  const pitchSVG = `<svg id="bm-pitch" viewBox="0 0 340 480" class="bm-pitch-svg" style="cursor:pointer;">
    <!-- Grass -->
    <rect x="10" y="10" width="320" height="460" rx="8" fill="#1a5c2a" stroke="#2d7a40" stroke-width="2"/>
    <!-- Center line -->
    <line x1="10" y1="245" x2="330" y2="245" stroke="#2d7a40" stroke-width="1.5"/>
    <!-- Center circle -->
    <circle cx="170" cy="245" r="42" fill="none" stroke="#2d7a40" stroke-width="1.5"/>
    <!-- Center spot -->
    <circle cx="170" cy="245" r="3" fill="#2d7a40"/>
    <!-- Penalty areas -->
    <rect x="55" y="10" width="230" height="80" rx="0" fill="none" stroke="#2d7a40" stroke-width="1.5"/>
    <rect x="55" y="390" width="230" height="80" rx="0" fill="none" stroke="#2d7a40" stroke-width="1.5"/>
    <!-- Small boxes -->
    <rect x="105" y="10" width="130" height="35" fill="none" stroke="#2d7a40" stroke-width="1.5"/>
    <rect x="105" y="435" width="130" height="35" fill="none" stroke="#2d7a40" stroke-width="1.5"/>
    <!-- Goals -->
    <rect x="135" y="6" width="70" height="8" fill="none" stroke="#ffffff44" stroke-width="1.5"/>
    <rect x="135" y="466" width="70" height="8" fill="none" stroke="#ffffff44" stroke-width="1.5"/>
    <!-- Formation label -->
    <text x="170" y="248" text-anchor="middle" fill="#2d7a4088" font-size="11" font-family="Space Grotesk,sans-serif" font-weight="600">4 - 4 - 2</text>
    ${formPos.map((fp,i) => `
    <g class="bm-fp" data-code="${fp.code}" data-pos="${fp.pos}" onclick="bmSelectPos('${fp.code}','${fp.pos}')" style="cursor:pointer;" id="bm-fp-${i}">
      <circle cx="${fp.x/100*320+10}" cy="${fp.y/100*460+10}" r="18" fill="#1e3a5f" stroke="#2563eb" stroke-width="2" class="bm-circle" id="bm-c-${i}"/>
      <text x="${fp.x/100*320+10}" y="${fp.y/100*460+10+4}" text-anchor="middle" fill="#fff" font-size="10" font-family="Space Grotesk,sans-serif" font-weight="700">${fp.label}</text>
    </g>`).join('')}
  </svg>`;
  
  return `<div class="bm-wrap">
    <div class="bm-pitch-col">
      <div class="bm-pitch-label">4 â 4 â 2 Formation â Click a Position</div>
      ${pitchSVG}
      <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;">
        <span style="font-size:10px;color:var(--text3);">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#1e3a5f;border:2px solid #2563eb;vertical-align:middle;margin-right:4px;"></span>Click to filter
        </span>
        <span id="bm-active-badge" style="font-size:10px;font-weight:700;color:#4ade80;display:none;background:rgba(74,222,128,.12);padding:2px 8px;border-radius:10px;"></span>
      </div>
    </div>
    <div class="bm-data-col">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div>
          <div class="bm-pos-title" id="bm-title">All Positions</div>
          <div class="bm-pos-sub" id="bm-sub">Liga MX · 2025/26 · Gross Annual Salary (USD)</div>
        </div>
        <div class="bm-filters">
          <select class="bm-filter-select" id="bm-club" onchange="bmRender()"><option value="">All Clubs</option>${clubOpts}</select>
          <select class="bm-filter-select" id="bm-age" onchange="bmRender()">
            <option value="">All Ages</option>
            <option value="U23">Under 23</option>
            <option value="23-28">23 â 28</option>
            <option value="29+">29+</option>
          </select>
          <select class="bm-filter-select" id="bm-sort" onchange="bmRender()">
            <option value="desc">Highest First</option>
            <option value="asc">Lowest First</option>
          </select>
          <button onclick="bmReset()" style="background:transparent;border:1px solid var(--border);color:var(--text3);font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit;">Reset</button>
        </div>
      </div>
      <div class="bm-stats-row" id="bm-stats"></div>
      <div style="overflow-x:auto;"><table class="bm-table"><thead><tr>
        <th>#</th><th>Player</th><th>Club</th><th>Age</th><th>Position</th><th>Gross Salary / yr</th><th>Distribution</th>
      </tr></thead><tbody id="bm-tbody"></tbody></table></div>
    </div>
  </div>`;
}

// Benchmark state
let _bmPos = null;
let _bmPosLabel = '';

function bmSelectPos(code, posLabel) {
  _bmPos = _bmPos === code ? null : code;
  _bmPosLabel = posLabel;
  // Update circle styles
  document.querySelectorAll('.bm-circle').forEach(c => {
    c.setAttribute('stroke', '#2563eb');
    c.setAttribute('fill', '#1e3a5f');
  });
  if (_bmPos) {
    document.querySelectorAll('[data-code="'+code+'"] .bm-circle').forEach(c => {
      c.setAttribute('stroke', '#4ade80');
      c.setAttribute('fill', '#0f4a28');
    });
    const badge = document.getElementById('bm-active-badge');
    if (badge) { badge.textContent = posLabel; badge.style.display = 'inline'; }
  } else {

function bmReset() {

  document.getElementById('bm-club').value = '';

  document.getElementById('bm-sort').value = 'desc';

  });
  const badge = document.getElementById('bm-active-badge');
  if (badge) badge.style.display = 'none';
  bmRender();

function bmFmt(k) {
  if (!k || k===0) return 'N/A';
  if (k >= 1000) return (k/1000).toFixed(1) + 'M';
  return k + 'K';
}

function bmRender() {
  let data = _BM_PLAYERS.slice();
  const club = document.getElementById('bm-club')?.value || '';
  const age = document.getElementById('bm-age')?.value || '';
  const sort = document.getElementById('bm-sort')?.value || 'desc';
  
  if (_bmPos) data = data.filter(p => p.p === _bmPos || p.pos === _bmPosLabel);
  if (club) data = data.filter(p => p.c === club);
  if (age === 'U23') data = data.filter(p => p.a < 23);
  else if (age === '23-28') data = data.filter(p => p.a >= 23 && p.a <= 28);
  else if (age === '29+') data = data.filter(p => p.a >= 29);
  
  data.sort((a,b) => sort === 'asc' ? a.g - b.g : b.g - a.g);
  
  const maxSal = data.length ? data[0].g : 1;
  const salaries = data.map(p=>p.g).filter(s=>s>0);
  const avg = salaries.length ? Math.round(salaries.reduce((a,b)=>a+b,0)/salaries.length) : 0;
  const median = salaries.length ? salaries[Math.floor(salaries.length/2)] : 0;
  
  // Update title
  const titleEl = document.getElementById('bm-title');
  if (titleEl) titleEl.textContent = _bmPos ? (_bmPosLabel || _bmPos) : 'All Positions';
  const subEl = document.getElementById('bm-sub');
  if (subEl) subEl.textContent = `Liga MX · 2025/26 · ${data.length} players · Gross Annual Salary (USD)`;
  
  // Stats
  const statsEl = document.getElementById('bm-stats');
  if (statsEl) statsEl.innerHTML = `
    <div class="bm-stat"><div class="bm-stat-val">${data.length}</div><div class="bm-stat-lbl">Players</div></div>
    <div class="bm-stat"><div class="bm-stat-val">${bmFmt(maxSal)}</div><div class="bm-stat-lbl">Highest</div></div>
    <div class="bm-stat"><div class="bm-stat-val">${bmFmt(avg)}</div><div class="bm-stat-lbl">Average</div></div>
    <div class="bm-stat"><div class="bm-stat-val">${bmFmt(median)}</div><div class="bm-stat-lbl">Median</div></div>
  `;
  
  // Table
  const tbody = document.getElementById('bm-tbody');
  if (!tbody) return;
  const html = data.slice(0, 100).map((p,i) => {
    const barW = maxSal > 0 ? Math.round((p.g/maxSal)*100) : 0;
    const posColors = {GK:'#f59e0b',CB:'#3b82f6',LB:'#3b82f6',RB:'#3b82f6',CM:'#8b5cf6',DM:'#8b5cf6',AM:'#8b5cf6',LW:'#10b981',RW:'#10b981',LM:'#10b981',RM:'#10b981',CF:'#ef4444',SS:'#ef4444'};
    const dotColor = posColors[p.p] || '#6b7280';
    return `<tr>
      <td style="color:var(--text3);font-size:11px;">${i+1}</td>
      <td style="font-weight:600;color:var(--text);">${p.n}</td>
      <td><span class="bm-club-badge">${p.c}</span></td>
      <td style="color:var(--text3);">${p.a}</td>
      <td><span class="bm-pos-dot" style="background:${dotColor};"></span>${p.pos||p.p}</td>
      <td class="sal">${bmFmt(p.g)}</td>
      <td style="min-width:80px;"><div class="bm-bar-wrap"><div class="bm-bar" style="width:${barW}%"></div></div></td>
    </tr>`;
  }).join('');
  tbody.innerHTML = html || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:32px;">No players match the current filters.</td></tr>';
}

function buildScoutingWorkflow(dept){
  var phaseColors = ['#e0a020','#1e6b8c','#0f6e56'];
  var html = '<div style="margin:0 0 24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">';

  html += '<span style="font-size:18px;">ð</span><div><div style="font-size:14px;font-weight:700;color:var(--text);">Full Scouting Process</div>';
  html += '<div style="font-size:11px;color:var(--text3);margin-top:2px;">End-to-end workflow â from club methodology to final recommendation</div></div></div>';
  html += '<div style="padding:16px 20px;">';
  dept.phases.forEach(function(phase, pi){
    html += '<div class="wf-phase-block">';
    html += '<div class="wf-phase-label" style="color:'+phaseColors[pi%phaseColors.length]+'">' + phase.name + '</div>';
    html += '<div class="wf-grid">';
    phase.steps.forEach(function(step, si){
      var stepNum = dept.phases.slice(0,pi).reduce(function(a,p){return a+p.steps.length;},0) + si + 1;
      html += '<div class="wf-step">';
      html += '<div class="wf-step-num">STEP ' + (stepNum < 10 ? '0'+stepNum : stepNum) + '</div>';
      html += '<div class="wf-step-title">' + step.s + '</div>';
      html += '<div class="wf-step-desc">' + step.d.substring(0, 120) + (step.d.length > 120 ? 'â¦' : '') + '</div>';
      html += '</div>';
    });
    html += '</div>';
    if(pi < dept.phases.length - 1){ html += '<div class="wf-arrow">â</div>'; }
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

    vendors.forEach(function(v,vi){
      html+=buildVcard(v,catId,vi);

  if(el)el.style.transform='translate('+_ocZ.tx+'px,'+_ocZ.ty+'px) scale('+_ocZ.s+')';
}
function ocZoomIn(){_ocZ.s=Math.min(1.4,_ocZ.s+0.1);ocUt();}

(function(){
  function setupOcDrag(){
    var w=document.getElementById('oc-viewport');
    if(!w||w._ocReady)return;
    w._ocReady=true;
    w.addEventListener('wheel',function(e){
      e.preventDefault();
      _ocZ.s=Math.max(0.3,Math.min(1.4,_ocZ.s-(e.deltaY>0?0.08:-0.08)));
      ocUt();
    },{passive:false});

      if(e.button===0){_ocZ.drag=true;_ocZ.sx=e.clientX-_ocZ.tx;_ocZ.sy=e.clientY-_ocZ.ty;}
    });
    window.addEventListener('mousemove',function(e){
      if(_ocZ.drag){_ocZ.tx=e.clientX-_ocZ.sx;_ocZ.ty=e.clientY-_ocZ.sy;ocUt();}
    });
    window.addEventListener('mouseup',function(){_ocZ.drag=false;});
  }
  // Try on DOM ready + retry when org chart tab is clicked
  document.addEventListener('DOMContentLoaded',setupOcDrag);
  document.addEventListener('click',function(e){
    var pill=e.target.closest('.nav-pill');
    if(pill&&pill.dataset.page==='orgchart')setTimeout(setupOcDrag,200);

function ocUt() {

document.addEventListener('DOMContentLoaded', function() {
  function bindOcDrag() {
    var w = document.getElementById('oc-viewport');

      e.preventDefault();
      _ocZ.s = Math.max(0.3, Math.min(1.4, _ocZ.s - (e.deltaY > 0 ? 0.08 : -0.08)));
      ocUt();
    }, { passive: false });
    w.addEventListener('mousedown', function(e) {
      if (e.button === 0) { _ocZ.drag = true; _ocZ.sx = e.clientX - _ocZ.tx; _ocZ.sy = e.clientY - _ocZ.ty; }
    });
    window.addEventListener('mousemove', function(e) {
      if (_ocZ.drag) { _ocZ.tx = e.clientX - _ocZ.sx; _ocZ.ty = e.clientY - _ocZ.sy; ocUt(); }

// FUNNEL DRAW
// ââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function drawFunnel() {
  var canvas = document.getElementById('funnelCanvas');
  if (!canvas) return;
  var layers = (typeof FUNNEL_LAYERS !== 'undefined') ? FUNNEL_LAYERS : [];
  if (!layers.length) return;

  var DPR = window.devicePixelRatio || 1;
  var W = canvas.parentElement ? canvas.parentElement.clientWidth - 32 : 560;
  if (W < 100) W = 560;
  var rowH = 40, gap = 6, pad = 8;
  var totalH = layers.length * (rowH + gap) + pad * 2;

  canvas.style.width  = W + 'px';
  canvas.style.height = totalH + 'px';
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(totalH * DPR);

  var ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  ctx.clearRect(0, 0, W, totalH);

  canvas._layers = [];

  layers.forEach(function(layer, i) {
    var indent = i * (W * 0.038);
    var x = indent;
    var w = W - indent * 2;
    var y = pad + i * (rowH + gap);
    var h = rowH;
    var r = 8;
    var col = layer.color || '#4ade80';

    canvas._layers.push({x:x, y:y, w:w, h:h, page:layer.page});

    // Fill â very light tint of the color
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
    else ctx.rect(x, y, w, h);
    ctx.fillStyle = col + '28';
    ctx.fill();

    // Border
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
    else ctx.rect(x, y, w, h);
    ctx.strokeStyle = col + '99';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label text
    ctx.font = '700 14px DM Sans, sans-serif';
    ctx.fillStyle = layer.textColor || '#052e16';
    ctx.fillText(layer.label, x + 14, y + h / 2 + 5);

    // Vendor names â right side subtle
    var names = (layer.names || []).join('  Â·  ');
    if (names) {
      var nameX = x + 200;
      ctx.font = '600 12px DM Sans, sans-serif';
      ctx.fillStyle = layer.textColor ? layer.textColor + '88' : '#05521688';
      // Measure and clip to fit
      var maxW = w - 220;
      var txt = names;
      while (ctx.measureText(txt).width > maxW && txt.length > 4) {
        txt = txt.slice(0, -4) + 'â¦';
      }
      ctx.fillText(txt, nameX, y + h / 2 + 5);
    }

    // Right arrow hint
    ctx.font = '14px sans-serif';
    ctx.fillStyle = col;
    ctx.fillText('âº', x + w - 20, y + h / 2 + 6);
  });

  // Click to navigate
  if (!canvas._clickBound) {
    canvas._clickBound = true;
    canvas.style.cursor = 'pointer';
    canvas.addEventListener('click', function(e) {
      var rect = canvas.getBoundingClientRect();
      var cx = (e.clientX - rect.left);
      var cy = (e.clientY - rect.top);
      (canvas._layers || []).forEach(function(l) {
        if (cx >= l.x && cx <= l.x + l.w && cy >= l.y && cy <= l.y + l.h) {
          if (l.page && typeof dpSwitch === 'function') dpSwitch(l.page);
        }
      });
    });
  }
}

      row('Tags (comma separated)', 'ed-tags', 'e.g. event data, API, Liga MX', 'text'),
      row('Description', 'ed-desc', 'Full description...', 'textarea'),
      '<div style="display:flex;gap:8px;margin-top:16px">',
      '<button onclick="addVendor()" style="padding:9px 20px;background:#22c55e;color:#052e16;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px">Add Vendor</button>',
      '<div id="ed-msg" style="line-height:37px;font-size:12px;color:#4ade80"></div>',
      '</div></div>'
    ].join('');
  }

  function row(label, id, placeholder, type, options) {
    var input;
    if (type === 'textarea') {
      input = '<textarea id="' + id + '" placeholder="' + placeholder + '" style="width:100%;background:#0a1a0e;border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:6px;padding:8px 10px;font-size:12px;height:80px;resize:vertical;font-family:DM Sans,sans-serif"></textarea>';
    } else if (type === 'select') {
      input = '<select id="' + id + '" style="width:100%;background:#0a1a0e;border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:6px;padding:8px 10px;font-size:12px">' + options + '</select>';
    } else {
      input = '<input id="' + id + '" type="text" placeholder="' + placeholder + '" style="width:100%;background:#0a1a0e;border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:6px;padding:8px 10px;font-size:12px"/>';
    }
    return '<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">' + label + '</div>' + input + '</div>';
  }

  window.addVendor = function() {
    var n    = document.getElementById('ed-name').value.trim();
    var cat  = document.getElementById('ed-cat').value;
    var ori  = document.getElementById('ed-origin').value.trim();
    var logo = document.getElementById('ed-logo').value.trim();
    var price= document.getElementById('ed-price').value.trim();
    var cli  = document.getElementById('ed-clients').value.trim();
    var tags = document.getElementById('ed-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
    var desc = document.getElementById('ed-desc').value.trim();

    if (!n || !cat) { document.getElementById('ed-msg').textContent = 'â  Name and category required'; return; }

    var entry = {n:n, origin:ori, logo:logo||('https://logo.clearbit.com/'+n.toLowerCase().replace(/\s+/g,'')+'.com'),
      c:'#15803d', bg:'#f0fdf4', bc:'#6ee7b7', tags:tags, price:price, clients:cli, desc:desc, badge:''};

    if (!window._dpVendors[cat]) window._dpVendors[cat] = [];
    window._dpVendors[cat].push(entry);
    if (!_DP_VENDORS[cat]) _DP_VENDORS[cat] = [];
    _DP_VENDORS[cat].push(entry);

    document.getElementById('ed-msg').textContent = 'â ' + n + ' added to ' + cat + '!';
    setTimeout(function(){ document.getElementById('ed-msg').textContent = ''; }, 3000);
  };

  function buildEditVendorsTab() {
    var html = '<div style="color:#fff"><div style="font-size:13px;font-weight:700;color:#4ade80;margin-bottom:14px">All vendors (' + Object.values(_DP_VENDORS).reduce(function(a,v){return a+v.length;},0) + ' total)</div>';
    Object.keys(_DP_VENDORS).forEach(function(catId) {
      var cat = (_DP_CATS||[]).find(function(c){return c.id===catId;});
      html += '<div style="font-size:11px;font-weight:700;color:' + (cat?cat.color:'#22c55e') + ';text-transform:uppercase;letter-spacing:.07em;margin:14px 0 6px">' + (cat?cat.label:catId) + '</div>';
      (_DP_VENDORS[catId]||[]).forEach(function(v, vi) {
        html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:#0a1a0e;border:1px solid rgba(255,255,255,.06);border-radius:7px;margin-bottom:4px">';
        html += '<img src="' + v.logo + '" style="width:24px;height:24px;border-radius:4px;object-fit:contain;background:#fff" onerror="this.style.display=\'none\'"/>';
        html += '<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#fff">' + v.n + '</div>';
        html += '<div style="font-size:10px;color:rgba(255,255,255,.4)">' + (v.price||'') + ' Â· ' + (v.origin||'') + '</div></div>';
        html += '<button onclick="removeVendor(\'' + catId + '\',' + vi + ')" style="padding:3px 8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:5px;cursor:pointer;font-size:10px;font-weight:600">Remove</button>';
        html += '</div>';
      });
    });
    return html + '</div>';
  }

  window.removeVendor = function(catId, idx) {
    if (!confirm('Remove this vendor?')) return;
    _DP_VENDORS[catId].splice(idx, 1);
    window._dpVendors[catId].splice(idx, 1);
    showTab(1);
  };

  function buildExportTab() {
    var exportData = {
      _note: 'Cyferd Hub Data â export from inline editor. Paste this back into the HTML to persist changes.',
      categories: _DP_CATS,
      vendors: _DP_VENDORS,
      platforms: typeof PLATFORMS !== 'undefined' ? PLATFORMS : [],
      funnel: typeof FUNNEL_LAYERS !== 'undefined' ? FUNNEL_LAYERS : []
    };
    var jsonStr = JSON.stringify(exportData, null, 2);

    return [
      '<div style="color:#fff">',
      '<div style="font-size:13px;font-weight:700;color:#4ade80;margin-bottom:6px">Export current data as JSON</div>',
      '<div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px">Copy this JSON and send it to Claude to update the HTML permanently, or save it as a backup.</div>',
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'ed-json\').value).then(function(){document.getElementById(\'cp-msg\').textContent=\'Copied!\';setTimeout(function(){document.getElementById(\'cp-msg\').textContent=\'\';},2000)})" style="margin-bottom:8px;padding:7px 16px;background:#22c55e;color:#052e16;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:12px">Copy to clipboard</button>',
      '<span id="cp-msg" style="margin-left:10px;font-size:12px;color:#4ade80"></span>',
      '<textarea id="ed-json" readonly style="width:100%;height:340px;background:#0a1a0e;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);border-radius:8px;padding:12px;font-family:DM Mono,monospace;font-size:10px;resize:none">' + jsonStr.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</textarea>',
      '</div>'
    ].join('');
  }

  // Permanent visible edit button â always visible
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.createElement('button');
    btn.id = 'ed-hint';
    btn.innerHTML = '&#9998; Editar contenido';
    btn.style.cssText = [
      'position:fixed;bottom:24px;right:24px;z-index:9998',
      'background:#22c55e;color:#052e16;border:none',
      'font-size:13px;font-weight:700;padding:11px 20px',
      'border-radius:25px;cursor:pointer',
      'box-shadow:0 4px 20px rgba(34,197,94,.4)',
      'font-family:DM Sans,sans-serif',
      'transition:transform .15s,box-shadow .15s'
    ].join(';');
    btn.onmouseover = function(){ btn.style.transform='scale(1.05)';btn.style.boxShadow='0 6px 28px rgba(34,197,94,.6)'; };
    btn.onmouseout  = function(){ btn.style.transform='scale(1)';  btn.style.boxShadow='0 4px 20px rgba(34,197,94,.4)'; };
    btn.addEventListener('click', toggleEditor);
    document.body.appendChild(btn);
  });

})();


</script>
</body>
</html>
